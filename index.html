<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contabilidad Gerencial | Tutor de Examen</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">CG</span>
          <div>
            <h1>Contabilidad Gerencial</h1>
            <p>Preparación examen 28/07/2026</p>
          </div>
        </div>

        <nav class="nav" aria-label="Secciones principales">
          <button class="nav-btn active" data-view="dashboard">Inicio</button>
          <button class="nav-btn" data-view="units">Unidades</button>
          <button class="nav-btn" data-view="practice">Práctica guiada</button>
          <button class="nav-btn" data-view="quiz">Multiple opción</button>
          <button class="nav-btn" data-view="exam">Simulacro</button>
          <button class="nav-btn" data-view="sources">Material fuente</button>
        </nav>

        <section class="progress-panel">
          <div class="progress-top">
            <span>Progreso</span>
            <strong id="progressPercent">0%</strong>
          </div>
          <div class="progress-bar"><span id="progressBar"></span></div>
          <p id="progressHint">Todavía no marcaste temas como vistos.</p>
        </section>

        <div class="sidebar-actions">
          <button class="ghost-btn" id="exportProgressBtn">Exportar progreso</button>
          <button class="ghost-btn" id="resetProgressBtn">Reiniciar</button>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Tutor interactivo</p>
            <h2 id="viewTitle">Plan de estudio</h2>
          </div>
          <div class="exam-countdown">
            <span id="daysLeft">--</span>
            <small>días al examen</small>
          </div>
        </header>

        <section id="view" class="view"></section>
      </main>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <h3>No hay contenido para mostrar</h3>
        <p>Probá cambiar de unidad o reiniciar la práctica.</p>
      </div>
    </template>

    <script src="data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
